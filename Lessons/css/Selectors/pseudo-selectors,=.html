<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <style>
            button:hover{
                background-color: aqua; color: white;
            }
            button:active{
                background-color: red; color: white;
            }
            input:focus{border:2px solid rgb(218, 255, 82);}
            p::before{content:"Before the text: ";
             font-weight:bold;
            }
            p::after{content: "After the text" ;
            font-style: italic;}
            ul li:first-child{font-weight: bold;}
            ul li:last-child{color: red;}
            ul li:first-of-type{ color: blue;}
            ul li:nth-child(2n){
                background-color: lightgray;
            }
        </style>
    </head>
    <body>
        <input type="text" placeholder="Why are you gay?" />
        <br />
        <button>Submit</button>
        <br />
        <p>AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA</p>
        <ul>
            <li>item 1</li>
            <li>item 2</li>
            <li>item 3</li>
            <li>item 4</li>
        </ul>
    </body>
</html>
